# Squix — Default Configuration
# All models disabled by default except Qwen 3.6 via OpenRouter.
# Add more models later by editing your per-project squix.yml.

models:
  - id: qwen/qwen3-235b-a22b
    provider: openrouter
    name: "Qwen3 235B"
    cost_per_1k_input: 0.0003
    cost_per_1k_output: 0.001
    context_limit: 131072
    specialization: ["code", "reasoning", "general"]
    daily_limit: null
    monthly_limit: null
    priority: 1

agents:
  - id: talk
    name: "Talk"
    role: "User-facing router — classify messages and delegate or respond directly."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: plan
    name: "Planner"
    role: "Break large tasks into actionable steps and control the orchestrator."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: orch
    name: "Orchestrator"
    role: "Main task dispatcher — receives steps from planner and routes them to worker agents."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: build
    name: "Builder"
    role: "Write code, implement solutions, create artifacts."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true
    count: 1

  - id: debug
    name: "Debugger"
    role: "Find bugs, fix errors, improve code quality."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true
    count: 1

  - id: web
    name: "Web Researcher"
    role: "Search the internet for information, documentation, and references."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: DB
    name: "Knowledge Base"
    role: "Manage project knowledge, documentation database, and structured information."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: AI
    name: "AI Specialist"
    role: "Handle ML, AI, model-related tasks and advice."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: idea
    name: "Idea Explorer"
    role: "Discuss project ideas, propose alternatives, brainstorm."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: product
    name: "Product Manager"
    role: "Turn ideas into products — plan features, UX, roadmaps."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

  - id: README
    name: "Documentation Writer"
    role: "Write README, guides, and user documentation."
    model_prefers: ["qwen/qwen3-235b-a22b"]
    enabled: true

# Agent communication topology (who can send to whom)
agent_links:
  talk: ["plan", "idea", "product", "web", "DB", "orch", "build", "debug", "AI", "README"]
  idea: ["product", "web"]
  product: ["web", "DB", "plan", "orch"]
  web: ["product", "DB", "orch", "idea"]
  plan: ["product", "orch"]
  DB: ["web", "product", "orch"]
  orch: ["AI", "README", "debug", "build", "plan", "product", "web", "DB"]
  build: ["debug", "AI", "orch"]
  debug: ["orch", "build", "AI"]
  AI: ["orch", "build", "debug"]
  README: ["orch"]

policy:
  cheap_model_threshold: 500
  fallback_enabled: true
  max_retries: 3
  escalation_enabled: true
  escalation_models:
    - "qwen/qwen3-235b-a22b"

memory:
  storage_dir: ".squix"
  session_dir: ".squix/sessions"
  auto_save_interval: 30

observability:
  log_level: "INFO"
  show_costs: true
  show_agent_status: true

workspace:
  root: "."
  artifacts_dir: ".squix/artifacts"
